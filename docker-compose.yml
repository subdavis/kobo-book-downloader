version: '3.8'
services:
  kobodl:
    image: ghcr.io/subdavis/kobodl:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kobodl
    restart: unless-stopped
    user: ${PUID:-1000}
    ports:
      - "5000:5000"
    volumes:
      - ${HOME}/.config/kobodl.json:/home/kobodl.json
      - ${HOME}/kobodl/downloads:/home/downloads
    command: --config /home/kobodl.json serve -p 5000 --output-dir /home/downloads
